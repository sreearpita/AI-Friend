# Use H2 in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema from entities (Flyway disabled)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Disable Ollama auto-configuration in tests
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.model=mistral

# App settings
app.persona=You are a helpful AI friend.
app.memory.top-k=5
app.chat.last-n-messages=10
