# Server configuration
server.port=${SERVER_PORT:8080}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging configuration
logging.level.root=INFO
logging.level.com.example.demo=${AIF_LOG_LEVEL:INFO}

# Local/dev persistence. Override these with PostgreSQL settings in deployed environments.
spring.datasource.url=${AIF_DATASOURCE_URL:jdbc:h2:mem:aifriend;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.driver-class-name=${AIF_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${AIF_DATASOURCE_USERNAME:sa}
spring.datasource.password=${AIF_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${AIF_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.h2.console.enabled=${AIF_H2_CONSOLE_ENABLED:false}

# Ollama configuration
spring.ai.ollama.base-url=${AIF_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.model=${AIF_OLLAMA_MODEL:mistral}

# AI-Friend platform defaults
aif.security.api-key-header=${AIF_API_KEY_HEADER:X-AIF-Tenant-Key}
aif.security.allowed-origins=${AIF_ALLOWED_ORIGINS:http://localhost:3000}
aif.security.seed-demo-tenant=${AIF_SEED_DEMO_TENANT:true}
aif.security.demo-tenant-slug=${AIF_DEMO_TENANT_SLUG:demo}
aif.security.demo-tenant-name=${AIF_DEMO_TENANT_NAME:Demo Tenant}
aif.security.demo-api-key=${AIF_DEMO_API_KEY:dev-aif-demo-key}
aif.chat.max-history-messages=${AIF_CHAT_MAX_HISTORY_MESSAGES:8}
aif.chat.max-message-length=${AIF_CHAT_MAX_MESSAGE_LENGTH:4000}
aif.tools.seed-demo-tools=${AIF_SEED_DEMO_TOOLS:false}
aif.tools.demo-callback-url=${AIF_DEMO_TOOL_CALLBACK_URL:http://localhost:8090/aif/tools}
aif.tools.demo-signing-secret=${AIF_DEMO_TOOL_SIGNING_SECRET:dev-aif-tool-secret}
aif.tools.demo-signing-key-id=${AIF_DEMO_TOOL_SIGNING_KEY_ID:dev-v1}
aif.tools.request-timeout-ms=${AIF_TOOL_REQUEST_TIMEOUT_MS:2000}

