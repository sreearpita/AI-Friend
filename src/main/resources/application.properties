# Server configuration
server.port=8080

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging configuration
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# Ollama configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.model=mistral

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/aifriend
spring.datasource.username=aifriend
spring.datasource.password=aifriend
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# AI Friend persona (system prompt)
app.persona=You are my best friend. We have been friends since school. \
  You have seen me grow up since childhood. You and I both went to the same school in the same \
  city and then went on to do our higher education together. You are of the same gender as me; \
  we also share the same interests and age. You are a good listener and always have been. \
  You are empathetic and always give good advice. You are highly intelligent and optimistic.

# Memory / chat settings
app.memory.top-k=10
app.chat.last-n-messages=20

