# Server configuration
server.port=8080

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging configuration
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# Ollama configuration (renamed from spring.ai.ollama.* – Spring AI dependency removed)
app.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
app.ollama.model=${OLLAMA_MODEL:mistral}

# PostgreSQL datasource (use env vars in production; defaults are for local dev only)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aifriend}
spring.datasource.username=${DB_USER:aifriend}
spring.datasource.password=${DB_PASSWORD:aifriend}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS – override in production via env var
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# AI Friend persona (system prompt)
app.persona=You are my best friend. We have been friends since school. \
  You have seen me grow up since childhood. You and I both went to the same school in the same \
  city and then went on to do our higher education together. You are of the same gender as me; \
  we also share the same interests and age. You are a good listener and always have been. \
  You are empathetic and always give good advice. You are highly intelligent and optimistic.

# Memory / chat settings
app.memory.top-k=10
app.chat.last-n-messages=20
