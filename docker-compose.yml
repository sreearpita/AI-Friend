version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aifriend-postgres
    environment:
      POSTGRES_DB: aifriend
      POSTGRES_USER: aifriend
      POSTGRES_PASSWORD: aifriend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aifriend -d aifriend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
